<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHARACTER COUNTER</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Real Time Character Counter</h1>
        <textarea class="textarea" id="textarea" placeholder="please write your text here" maxlength="100"></textarea>
        <div class="counter">
           <p>
            Total Character:
            <span id="total-char" class="total-char">
                0
            </span>
           </p> 

           <p>
            Remaining Character:
            <span id="rem-char" class="rem-char">
                100
            </span>
           </p> 
        </div>
    </div>


    <script src="script.js"></script>
</body>
</html>
